            <div class="month-nav">
              <button class="nav-btn" data-pcal-nav="-1" title="Previous">&#8592;</button>
              <select id="pcal-sel-month" style="min-width:0">
                <option value="0">Jan</option><option value="1">Feb</option>
                <option value="2">Mar</option><option value="3">Apr</option>
                <option value="4">May</option><option value="5">Jun</option>
                <option value="6">Jul</option><option value="7">Aug</option>
                <option value="8">Sep</option><option value="9">Oct</option>
                <option value="10">Nov</option><option value="11">Dec</option>
              </select>
              <button class="nav-btn" data-pcal-nav="1" title="Next">&#8594;</button>
            </div>
          </div>
          <div class="current-month-display" id="pcal-cal-month-label"></div>
        </div>

        <button class="sidebar-add-btn pcal-admin-only" id="pcal-add-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 1v12M1 7h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Add Event
        </button>

        <div class="sidebar-legend" id="pcal-sidebar-legend"></div>
      </div>
    </aside>

    <!-- ══════════ CONTENT ══════════ -->
    <main class="content">

      <!-- CALENDAR TAB -->
      <div id="pcal-tab-calendar" class="tab-panel active">
        <div class="calendar-card">
          <div class="cal-grid" id="pcal-cal-header"></div>
          <div class="cal-grid" id="pcal-cal-body"></div>
        </div>
        <div class="section-heading" id="pcal-events-list-title">Events This Month</div>
        <div id="pcal-events-list"></div>
      </div>

      <!-- SETTINGS TAB -->
      <div id="pcal-tab-settings" class="tab-panel">
        <div class="settings-grid">
          <div class="settings-card">
            <div class="settings-card-header">
              <h3>🏛️ Districts</h3>
              <p>Add or remove districts</p>
            </div>
            <div class="settings-card-body">
              <div class="add-item-row">
                <input type="text" id="pcal-new-district" placeholder="District name…">
                <button class="btn-primary small" id="pcal-add-district-btn">Add</button>
              </div>
              <div class="item-list" id="pcal-district-list"></div>
            </div>
          </div>

          <div class="settings-card">
            <div class="settings-card-header">
              <h3>🎯 Program Types</h3>
              <p>Add or remove program categories</p>
            </div>
            <div class="settings-card-body">
              <div class="add-item-row">
                <input type="text" id="pcal-new-program" placeholder="Program type…">
                <button class="btn-primary small" id="pcal-add-program-btn">Add</button>
              </div>
              <div class="item-list" id="pcal-program-list"></div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- ══ ADD EVENT MODAL ══ -->
  <div class="modal-overlay" id="pcal-modal-add">
    <div class="modal">
      <div class="modal-header">
        <h2>➕ Add New Event</h2>
        <button class="modal-close" data-pcal-close="pcal-modal-add">×</button>
      </div>
      <div class="modal-body">
        <div class="form-row thirds" style="margin-bottom:14px">
          <div class="form-group" id="pcal-fg-eyear" style="margin-bottom:0">
            <label class="field-label">Year <span class="req">*</span></label>
            <select id="pcal-evt-year"></select>
            <div class="form-error">Required</div>
          </div>
          <div class="form-group" id="pcal-fg-emonth" style="margin-bottom:0">
            <label class="field-label">Month <span class="req">*</span></label>
            <select id="pcal-evt-month">
              <option value="">—</option>
              <option value="0">Jan</option><option value="1">Feb</option>
              <option value="2">Mar</option><option value="3">Apr</option>
              <option value="4">May</option><option value="5">Jun</option>
              <option value="6">Jul</option><option value="7">Aug</option>
              <option value="8">Sep</option><option value="9">Oct</option>
              <option value="10">Nov</option><option value="11">Dec</option>
            </select>
            <div class="form-error">Required</div>
          </div>
          <div class="form-group" id="pcal-fg-eday" style="margin-bottom:0">
            <label class="field-label">Day <span class="req">*</span></label>
            <select id="pcal-evt-day"><option value="">—</option></select>
            <div class="form-error">Required</div>
          </div>
        </div>

        <div class="form-group" id="pcal-fg-edistrict">
          <label class="field-label">District <span class="req">*</span></label>
          <select id="pcal-evt-district"><option value="">Select district…</option></select>
          <div class="form-error">Required</div>
        </div>

        <div class="form-group" id="pcal-fg-etype">
          <label class="field-label">Program Type <span class="req">*</span></label>
          <select id="pcal-evt-type"><option value="">Select type…</option></select>
          <div class="form-error">Required</div>
        </div>

        <div class="form-group">
          <label class="field-label">Description <span style="color:var(--text-light);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
          <textarea id="pcal-evt-desc" maxlength="500" placeholder="Short note about this event…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" data-pcal-close="pcal-modal-add">Cancel</button>
        <button class="btn-primary" id="pcal-save-event">Save Event</button>
      </div>
    </div>
  </div>

  <div class="toast" id="pcal-toast"></div>

  <!-- ══ EVENT DETAILS MODAL ══ -->
  <div class="modal-overlay" id="pcal-modal-details">
    <div class="modal">
      <div class="modal-header">
        <h2>📌 Event Details</h2>
        <button class="modal-close" data-pcal-close="pcal-modal-details">×</button>
      </div>
      <div class="modal-body" id="pcal-details-body"></div>
      <div class="modal-footer">
        <button class="btn-secondary" data-pcal-close="pcal-modal-details">Close</button>
      </div>
    </div>
  </div>

  <!-- Blocking loader: blurred backdrop + circle spinner (save / delete) -->
  <div class="pcal-loader-overlay" id="pcal-loader"><div class="pcal-spinner"></div></div>

  <template id="pcal-icon-trash">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 4h11M5 4V2.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5V4M6 7v4M9 7v4M3 4l.8 8.1a1 1 0 0 0 1 .9h5.4a1 1 0 0 0 1-.9L12 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </template>

</div>
